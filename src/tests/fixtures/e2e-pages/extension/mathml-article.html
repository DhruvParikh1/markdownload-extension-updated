<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>MathML Article Fixture</title>
</head>
<body>
  <article>
    <h1>MathML Article Fixture</h1>
    <p>This page verifies that native MathML survives the full extension clipping pipeline as TeX.</p>
    <p>
      The acquisition price
      <math>
        <mrow>
          <msub>
            <mi>P</mi>
            <mrow><mi>i</mi><mo>,</mo><mi>j</mi><mo>,</mo><mi>t</mi><mo>_</mo><mi>a</mi></mrow>
          </msub>
        </mrow>
      </math>
      should not be exported as plain text.
    </p>
    <p>
      A block equation is also included:
    </p>
    <math display="block">
      <mrow>
        <mi>E</mi>
        <mo>=</mo>
        <mi>m</mi>
        <msup><mi>c</mi><mn>2</mn></msup>
      </mrow>
    </math>
  </article>
</body>
</html>
